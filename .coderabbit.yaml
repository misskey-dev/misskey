# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

# CodeRabbit Configuration
# https://docs.coderabbit.ai/guides/review-settings/

# Language and Tone
language: ja-JP
tone_instructions: "日本語で丁寧なトーンでレビューしてください。建設的で親切なフィードバックを心がけてください。"

# Review Settings
reviews:
  # Enable review status messages
  review_status: true

  # Review bot PRs
  auto_review:
    enabled: true
    # Review PRs from bots
    drafts: false

  # Path instructions for specific file types
  path_instructions:
    - path: "packages/backend/**/*.ts"
      instructions: "Focus on security, error handling, and type safety."
    - path: "packages/frontend/**/*.ts"
      instructions: "Focus on performance, best practices, and type safety."
    - path: "packages/frontend/**/*.vue"
      instructions: "Focus on Vue.js best practices and component design."

# Chat Settings
chat:
  auto_reply: true
