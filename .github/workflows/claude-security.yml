name: Security Review

on:
  pull_request_target:
    types: [opened, synchronize]
    paths:
      - "packages/backend/**"
      - "packages/misskey-js/**"

jobs:
  security-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Security Review
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_MODEL: claude-opus-4-6
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--max-turns 30"
          settings: |
            {
              "permissions": {
                "deny": ["Bash"]
              }
            }
          prompt: |
            You are a senior security engineer. Review the security implications of this PR's changed files.

            ## OBJECTIVE
            Identify HIGH-CONFIDENCE security vulnerabilities introduced by this PR.
            Focus ONLY on the changed files. Do NOT perform broad codebase research — read only the files that are directly relevant to the changes.

            ## HOW TO WORK EFFICIENTLY
            1. Read the changed files listed in the PR context
            2. For each changed file, analyze security implications directly
            3. Post review comments for any findings, then conclude

            ## SECURITY CATEGORIES TO EXAMINE

            - SQL/NoSQL injection, Command injection, Path traversal, XSS (stored, reflected, DOM)
            - Authentication bypass, Privilege escalation, Authorization logic bypasses
            - Misskey API permission checks (role-based access)
            - Hardcoded secrets, Weak cryptography
            - RCE via deserialization, Eval injection, Prototype pollution
            - Sensitive data logging (passwords, tokens), API data leakage
            - ActivityPub: unsigned activities, object injection, remote user impersonation
            - Drive file access control bypass, Streaming API authorization issues

            ## EXCLUSIONS — DO NOT REPORT

            - DoS / resource exhaustion / rate limiting
            - Open redirects, tabnabbing, XS-Leaks
            - Regex injection / ReDoS
            - Memory safety issues in non-C/C++ code
            - Input validation without proven exploit path
            - GitHub Actions workflow input sanitization
            - Theoretical race conditions
            - Outdated library versions
            - Log spoofing / log query injection
            - Path-only SSRF without internal service access
            - Client-side permission check gaps (server must enforce)
            - Unit test files, Markdown/documentation files

            ## FALSE POSITIVE NOTES

            - URL logging is NOT a vulnerability; plaintext password/token logging IS
            - UUIDs are unpredictable — do not flag as insecure identifiers
            - Environment variables and CLI flags are trusted
            - Vue template rendering is XSS-safe by default (except v-html)
            - MEDIUM findings must be specific, not speculative

            ## SEVERITY

            - **HIGH**: RCE, data breach, or authentication bypass
            - **MEDIUM**: Exploitable under specific realistic conditions
            - **LOW**: Defense-in-depth concern

            ## OUTPUT FORMAT

            For each finding, post a review comment on the specific file and line:

            **🔒 Security: [title]**
            **Severity:** HIGH / MEDIUM / LOW
            **Category:** (e.g., sql_injection, auth_bypass, xss)

            **Description:** Clear explanation.

            **Exploit scenario:** Concrete attack steps.

            **Recommendation:** Specific fix with code example.

            ---

            If NO security issues are found, post a single summary comment:
            "✅ Security review complete — no significant vulnerabilities identified in this changeset."
