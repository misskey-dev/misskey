name: Publish Docker image

on:
  push:
    branches-ignore:
      - dependabot/**

  workflow_dispatch:

env:
  REGISTRY_IMAGE: kanarikanaru/hanamisskey

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    outputs:
      image-tag: ${{ steps.stamp_version.outputs.image_tag }}
    env:
      IMAGE_TAG: ${{ github.ref_name }}
    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV
      - name: Check out the repo
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master
      - name: Install jaq
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
        run: brew install jaq
      - name: Stamp package version
        id: stamp_version
        run: |
          build_count=$(git rev-list --count HEAD)
          short_sha=$(git rev-parse --short HEAD)
          jaq --in-place --arg build "$build_count" --arg sha "$short_sha" '
            .version |= sub("^(?<core>\\d+\\.\\d+\\.\\d+)(-.*)?$"; "\(.core)-hanami.\($build)+\($sha)")
          ' package.json
          stamped_version=$(jaq -r '.version' package.json)
          echo "PACKAGE_VERSION=$stamped_version" >> $GITHUB_ENV
          sanitized_ref=$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9_.-]/-/g')
          sanitized_version=$(echo "$stamped_version" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9_.-]/-/g')
          image_tag="${sanitized_ref}-${sanitized_version}"
          echo "image_tag=$image_tag" >> $GITHUB_OUTPUT
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push image
        id: build-image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: ${{ matrix.platform }}
          provenance: false
          labels: ${{ steps.stamp_version.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p /tmp/digests/linux
          digest="${{ steps.build-image.outputs.digest }}"
          if [ -z "$digest" ]; then
            echo "Digest is empty. Exiting with error."
            exit 1
          fi
          echo "$digest" > "/tmp/digests/${{ matrix.platform }}.digest"
      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/linux/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs:
      - build
    env:
      IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests/linux
          pattern: digests-*
          merge-multiple: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Create manifest list and push
        working-directory: /tmp/digests/linux
        run: |
          docker buildx imagetools create --tag "${{ env.REGISTRY_IMAGE }}:${{ env.IMAGE_TAG }}" \
            $(for f in *.digest; do
                digest_contents=$(cat "$f")
                echo "${{ env.REGISTRY_IMAGE }}@${digest_contents}"
              done
            )
      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY_IMAGE }}:${{ env.IMAGE_TAG }}
