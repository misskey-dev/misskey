services:
  web:
    build: .
    image: oranski-nocturne-web
    restart: unless-stopped
    ports:
      - "3000-3001:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    # env_file:
    #   - .config/docker.env
    volumes:
      - /home/oranski-nocturne/data/files:/misskey/files
      - /home/oranski-nocturne/data/.config:/misskey/.config:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "-H", "Content-Type:application/json", "-d", "{}", "-X", "POST", "http://localhost:3000/api/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
      start_interval: 3s
    deploy:
      resources:
        limits:
          # 実使用量~1GB/コンテナに対して上限3GBで十分。メモリリーク時の暴走防止
          memory: 3G
        reservations:
          memory: 1536M
    environment:
      - NODE_ENV=production
      # ヒープ上限: 実使用量~1GBに対して2GBで十分な余裕
      - NODE_OPTIONS=--max-old-space-size=2048

  redis:
    restart: unless-stopped
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - ./redis:/data
    env_file:
      - .env.redis
    command: >
      sh -c 'redis-server
      --requirepass "$$REDIS_PASSWORD"
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --tcp-keepalive 60
      --tcp-backlog 511'
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli -p 6379 -a \"$$REDIS_PASSWORD\" ping"]
      interval: 5s
      retries: 20
    deploy:
      resources:
        limits:
          # Redis実使用量183MBに対して640MBで十分。allkeys-lruで自動削除
          memory: 640M
        reservations:
          memory: 256M


