packages:
  - packages/backend
  - packages/frontend-shared
  - packages/frontend
  - packages/frontend-builder
  - packages/frontend-embed
  - packages/i18n
  - packages/icons-subsetter
  - packages/sw
  - packages/misskey-js
  - packages/misskey-js/generator
  - packages/misskey-reversi
  - packages/misskey-bubble-game
allowBuilds:
  '@nestjs/core': true
  '@parcel/watcher': true
  '@sentry/profiling-node': true
  '@sentry-internal/node-cpu-profiler': true
  bufferutil: true
  canvas: true
  core-js: true
  cypress: true
  esbuild: true
  msgpackr-extract: true
  msw: true
  nice-napi: true
  re2: true
  sharp: true
  utf-8-validate: true
  v-code-diff: true
  vue-demi: true
  exifreader: false
minimumReleaseAge: 10080 # delay 7days to mitigate supply-chain attack
minimumReleaseAgeExclude:
  - '@misskey-dev/*'
  - '@syuilo/aiscript'
  - buraha
  - mfm-js
  - slacc
  - slacc-android-arm-eabi
  - slacc-android-arm64
  - slacc-darwin-arm64
  - slacc-darwin-universal
  - slacc-darwin-x64
  - slacc-freebsd-x64
  - slacc-linux-arm-gnueabihf
  - slacc-linux-arm64-gnu
  - slacc-linux-arm64-musl
  - slacc-linux-x64-gnu
  - slacc-linux-x64-musl
  - slacc-win32-arm64-msvc
  - slacc-win32-x64-msvc
  - '@typescript/native-preview*'
  - pnpm
  - esbuild # 脆弱性対応。そのうち消す
  - '@esbuild/*' # 脆弱性対応。そのうち消す
  - js-yaml # 脆弱性対応。そのうち消す
  - vite # 脆弱性対応。そのうち消す
  - form-data # 脆弱性対応。そのうち消す
  - tar
  # Renovate security update: nodemailer@9.0.1
  - nodemailer@9.0.1
overrides:
  '@aiscript-dev/aiscript-languageserver': '-'
  chokidar: 5.0.0
  lodash: 4.18.1
  # remove when vite is updated to versions with rolldown > 1.1.0
  vite>rolldown: "~1.1.0"
engineStrict: true
saveExact: true
shellEmulator: true
